<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  .container {
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: #e94560;
    text-shadow: 0 0 20px rgba(233,69,96,.4);
  }
  .info {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 12px;
    font-size: 1.1rem;
  }
  .info span { color: #0f3460; background: #e94560; padding: 4px 16px; border-radius: 20px; font-weight: bold; }
  canvas {
    border: 2px solid #e94560;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(233,69,96,.3);
    display: block;
    margin: 0 auto;
  }
  .controls {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  button {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 28px;
    font-size: 1rem;
    border-radius: 25px;
    cursor: pointer;
    transition: all .2s;
  }
  button:hover { background: #c73652; transform: scale(1.05); }
  .hint {
    margin-top: 12px;
    color: #888;
    font-size: .85rem;
  }
  /* 移动端虚拟方向键 */
  .d-pad {
    display: none;
    margin-top: 16px;
    user-select: none;
  }
  .d-pad button {
    width: 56px; height: 56px;
    font-size: 1.4rem;
    padding: 0;
    border-radius: 12px;
    background: #16213e;
    border: 2px solid #e94560;
  }
  .d-pad button:active { background: #e94560; }
  .d-row { display: flex; justify-content: center; gap: 6px; }
  @media (pointer: coarse) {
    .d-pad { display: block; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🐍 贪吃蛇</h1>
  <div class="info">
    <span>分数：<b id="score">0</b></span>
    <span>最高：<b id="best">0</b></span>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <button id="startBtn">开始游戏</button>
    <button id="pauseBtn" disabled>暂停</button>
  </div>
  <p class="hint">方向键 / WASD 控制方向 · 空格暂停</p>
  <div class="d-pad">
    <div class="d-row"><button id="du">⬆</button></div>
    <div class="d-row">
      <button id="dl">⬅</button>
      <button id="dd">⬇</button>
      <button id="dr">➡</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best = 0, speed, loop, running, paused;

function init() {
  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speed = 120;
  paused = false;
  scoreEl.textContent = 0;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  // 背景
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      ctx.strokeRect(i * CELL, j * CELL, CELL, CELL);
    }
  }

  // 食物
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇身
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(180 + 75 * ratio);
    ctx.fillStyle = i === 0 ? '#0f3460' : `rgb(15,${g},96)`;
    ctx.shadowColor = i === 0 ? '#0f3460' : 'transparent';
    ctx.shadowBlur = i === 0 ? 8 : 0;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

function update() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 撞墙或撞自己
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    placeFood();
    if (speed > 60) speed -= 2; // 加速
  } else {
    snake.pop();
  }
}

function step() {
  if (!paused) { update(); draw(); }
}

function gameOver() {
  running = false;
  clearInterval(loop);
  pauseBtn.disabled = true;
  startBtn.textContent = '再来一局';

  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 10);
  ctx.fillStyle = '#eee';
  ctx.font = '20px sans-serif';
  ctx.fillText('得分：' + score, canvas.width / 2, canvas.height / 2 + 25);
}

function startGame() {
  if (running) return;
  init();
  running = true;
  startBtn.textContent = '游戏中...';
  pauseBtn.disabled = false;
  draw();
  loop = setInterval(step, speed);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '继续' : '暂停';
}

function setDir(x, y) {
  if (dir.x === -x && dir.y === -y) return; // 不能掉头
  nextDir = { x, y };
}

// 键盘
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

// 触屏方向键
document.getElementById('du').addEventListener('click', () => setDir(0, -1));
document.getElementById('dd').addEventListener('click', () => setDir(0, 1));
document.getElementById('dl').addEventListener('click', () => setDir(-1, 0));
document.getElementById('dr').addEventListener('click', () => setDir(1, 0));

startBtn.addEventListener('click', startGame);
pauseBtn.addEventListener('click', togglePause);

// 初始画面
init();
draw();
ctx.fillStyle = 'rgba(0,0,0,.5)';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = '#eee';
ctx.font = '18px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('点击「开始游戏」', canvas.width / 2, canvas.height / 2);
</script>
</body>
</html>
